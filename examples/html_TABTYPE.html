document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1da2e9df-e656-416b-974c-3b3b0ea52684\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>/* VATOS webfonts — Pretendard (Korean + Latin) for UI/body, JetBrains Mono for code/metrics.\n   Pretendard is the brand's primary typeface across proposals, reports, HTML and PPT.\n   Loaded from CDN; if you need fully offline assets, self-host the woff2 files and update src. */\n\n@font-face {\n  font-family: \"Pretendard Variable\";\n  font-weight: 45 920;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2\") format(\"woff2-variations\");\n}\n\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-weight: 400 800;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.18/files/jetbrains-mono-latin-variable-wghtOnly-normal.woff2\") format(\"woff2-variations\");\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   VATOS · Color Tokens\n   브랜드 컬러는 구조와 강조에, Semantic Color는 상태 의미에 사용합니다.\n   색상만으로 의미를 전달하지 않고 항상 텍스트 라벨을 함께 사용합니다.\n   ============================================================ */\n:root {\n  /* ---- Brand / Dark structure ---- */\n  --vds-premium-dark: #07141F;  /* Dark 테마 최심 배경 — 표지/히어로/섹션 구분/Closing */\n  --vds-urban-navy:   #192C4F;  /* Urban Navy 테마 메인, 섹션 구분, 다크 카드 */\n  --vds-graphite:     #3D4345;  /* 제목 텍스트(강한 위계), 로고 마크 */\n  --vds-charcoal:     #4E5658;  /* 기본 본문/제목 텍스트 */\n\n  /* ---- Brand accent ---- */\n  --vds-cyan:      #23A5B3;  /* VATOS 브랜드 강조, CTA, 아이콘, 포인트 */\n  --vds-deep-teal: #0F4B51;  /* hover, eyebrow, 강조 텍스트 */\n\n  /* ---- Neutral surfaces ---- */\n  --vds-paper: #FFFEFA;  /* Light 테마 기본 문서 배경 (Paper White) */\n  --vds-cloud: #F7F9FA;  /* 보조 카드 배경, 표 헤더, 섹션 구분 */\n  --vds-soft:  #E8EEF0;  /* 보더, 구분선, 연한 배경 */\n  --vds-white: #FFFFFF;  /* 기본 카드 표면 */\n  --vds-page:  #FFFEFA;  /* 전체 문서 배경 — 밝고 깨끗하게 (Paper White) */\n\n  --vds-line: rgba(7, 20, 31, .12);  /* 기본 보더 컬러 */\n\n  /* ---- Semantic / status (의미 색상) ---- */\n  --vds-success:      #2E7D32;  --vds-success-soft: #E8F5E9;  /* 개선, 정상, 완료 */\n  --vds-danger:       #C62828;  --vds-danger-soft:  #FDECEC;  /* 저하, 오류, 위험 */\n  --vds-warning:      #F59E0B;  --vds-warning-soft: #FFF7E6;  --vds-warning-ink: #A76300; /* 주의, 검토 필요 */\n  --vds-info:         #2563EB;  --vds-info-soft:    #EFF6FF;  /* 참고, 안내 */\n  --vds-neutral:      #6F7A7D;                                /* 변경 없음, 중립 */\n\n  /* ---- Accent tints ---- */\n  --vds-cyan-tint: #E6F7F8;          /* cyan soft 배경 (라벨, chip) */\n  --vds-cyan-12:   rgba(35, 165, 179, .12);  /* focus ring */\n  --vds-cyan-on-dark: #7BE1EA;       /* 다크 배경 위 cyan 텍스트 */\n\n  /* ============================================================\n     Semantic aliases — 컴포넌트는 가능하면 이 별칭을 사용합니다.\n     ============================================================ */\n  --vds-text-strong:  var(--vds-graphite);   /* 제목/강조 텍스트 (Light 테마) */\n  --vds-text-heading: var(--vds-graphite);    /* 카드 제목 */\n  --vds-text-body:    var(--vds-charcoal);     /* 본문 */\n  --vds-text-muted:   var(--vds-neutral);      /* 주석, caption */\n  --vds-text-on-dark: var(--vds-white);\n  --vds-text-on-dark-soft: rgba(255, 255, 255, .78);\n  --vds-ink:          var(--vds-premium-dark);   /* 다크 표면 배경 전용 */\n\n  --vds-surface-page:   var(--vds-page);\n  --vds-surface-card:   var(--vds-white);\n  --vds-surface-sunken: var(--vds-cloud);\n  --vds-surface-dark:   var(--vds-premium-dark);  /* Dark 테마 최심 배경 */\n  --vds-surface-navy:   var(--vds-urban-navy);    /* Urban Navy 테마 (회사소개서) */\n  --vds-surface-dark-2: var(--vds-urban-navy);\n\n  --vds-border:       var(--vds-soft);\n  --vds-border-faint: var(--vds-line);\n\n  --vds-accent:       var(--vds-cyan);\n  --vds-accent-hover: var(--vds-deep-teal);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   VATOS · Typography Tokens\n   Pretendard 기반으로 통일. 제목 → 요약 → 본문 → 주석 위계를 분명히 합니다.\n   제목은 음수 letter-spacing으로 단단하게, 본문은 1.6 내외 행간으로 가독성 우선.\n   ============================================================ */\n:root {\n  /* ---- Font families ---- */\n  --vds-font-sans: \"Pretendard Variable\", Pretendard, \"Noto Sans KR\", \"Malgun Gothic\", -apple-system, system-ui, sans-serif;\n  --vds-font-mono: \"JetBrains Mono\", Consolas, Monaco, \"Courier New\", monospace;\n\n  /* ---- Type scale (px) ----\n     16px가 본문 기준. PPT 1920x1080 본문은 24px 이상, 제목은 display 사용. */\n  --vds-fs-display:  56px;  /* 표지 hero, 대형 제목 */\n  --vds-fs-h1:       44px;  /* 페이지 타이틀 */\n  --vds-fs-h2:       32px;  /* 슬라이드 제목, 섹션 */\n  --vds-fs-h3:       24px;  /* 카드 제목, 블록 헤더 */\n  --vds-fs-h4:       19px;  /* 소제목 */\n  --vds-fs-lg:       17px;  /* 리드 본문 */\n  --vds-fs-body:     15px;  /* 기본 본문 */\n  --vds-fs-sm:       13px;  /* 보조 본문, 표 */\n  --vds-fs-xs:       12px;  /* caption, 라벨 */\n  --vds-fs-2xs:      11px;  /* 미세 라벨, 토큰 chip */\n\n  /* ---- Line heights ---- */\n  --vds-lh-tight:    1.1;   /* @kind font */ /* display, 대형 제목 */\n  --vds-lh-heading:  1.2;   /* @kind font */ /* 제목 */\n  --vds-lh-snug:     1.45;  /* @kind font */ /* 카드 copy, 표 */\n  --vds-lh-body:     1.62;  /* @kind font */ /* 본문 단락 */\n\n  /* ---- Weights (Pretendard variable) ---- */\n  --vds-fw-regular:  450;  /* @kind font */\n  --vds-fw-medium:   550;  /* @kind font */\n  --vds-fw-semibold: 700;  /* @kind font */\n  --vds-fw-bold:     800;  /* @kind font */\n  --vds-fw-black:    900;  /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --vds-ls-display: -.055em;  /* 대형 제목은 타이트하게 */\n  --vds-ls-heading: -.04em;\n  --vds-ls-tight:   -.025em;\n  --vds-ls-normal:  0;        /* @kind font */\n  --vds-ls-eyebrow: .09em;    /* eyebrow / 작은 대문자 라벨 */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   VATOS · Spacing, Radius, Elevation Tokens\n   8px 단위를 중심으로 간격을 확장. 여백은 빈 공간이 아니라 정보 그룹을 구분하는 구조.\n   깊이감은 장식이 아니라 정보 그룹을 구분하는 보조 수단 — 얇은 보더 우선, 낮은 그림자.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale ---- */\n  --vds-space-4:  4px;   /* 아이콘과 텍스트 */\n  --vds-space-8:  8px;   /* 라벨과 값 */\n  --vds-space-12: 12px;  /* 작은 내부 간격 */\n  --vds-space-16: 16px;  /* 기본 요소 간격 */\n  --vds-space-24: 24px;  /* 카드 padding */\n  --vds-space-32: 32px;  /* 주요 블록 간격 */\n  --vds-space-48: 48px;  /* PPT 상하 여백 */\n  --vds-space-64: 64px;  /* HTML 큰 섹션 */\n\n  /* ---- Radius scale ---- (약한 라운드. 과한 둥근 UI는 캐주얼 → 제한) */\n  --vds-radius-xs:   4px;    /* 작은 라벨, 표 내부 요소 */\n  --vds-radius-sm:   8px;    /* 태그, 작은 박스 */\n  --vds-radius-md:   12px;   /* 버튼, 입력폼 */\n  --vds-radius-lg:   16px;   /* 기본 카드, 알림 박스 */\n  --vds-radius-xl:   20px;   /* 큰 컨테이너 */\n  --vds-radius-full: 999px;  /* 배지, pill */\n\n  /* ---- Elevation / shadow ---- (낮고 부드럽게. lg는 모달/팝오버 전용) */\n  --vds-shadow-xs: 0 2px 6px rgba(7, 20, 31, .04);   /* 아주 약한 표면 분리 */\n  --vds-shadow-sm: 0 6px 16px rgba(7, 20, 31, .05);  /* 일반 카드 */\n  --vds-shadow-md: 0 10px 26px rgba(7, 20, 31, .06); /* 핵심 카드, 요약 블록 */\n  --vds-shadow-lg: 0 18px 42px rgba(7, 20, 31, .10); /* 모달, 팝오버 전용 */\n\n  /* ---- Focus ring ---- */\n  --vds-ring: 0 0 0 3px var(--vds-cyan-12);\n\n  /* ---- Layout ---- */\n  --vds-container: 1280px;   /* HTML 문서 최대 폭 */\n  --vds-gutter:    24px;     /* 12-column grid gutter */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   VATOS · Base / Element defaults\n   Applies brand typography + page color to the document.\n   Tokens come from tokens/*.css (imported before this in styles.css).\n   ============================================================ */\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  min-height: 100%;\n  font-family: var(--vds-font-sans);\n  font-size: var(--vds-fs-body);\n  line-height: var(--vds-lh-body);\n  color: var(--vds-text-body);\n  background: var(--vds-surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  margin: 0;\n  color: var(--vds-text-strong);\n  font-weight: var(--vds-fw-black);\n  line-height: var(--vds-lh-heading);\n  letter-spacing: var(--vds-ls-heading);\n  text-wrap: balance;\n}\nh1 { font-size: var(--vds-fs-h1); letter-spacing: var(--vds-ls-display); line-height: var(--vds-lh-tight); }\nh2 { font-size: var(--vds-fs-h2); }\nh3 { font-size: var(--vds-fs-h3); color: var(--vds-text-heading); letter-spacing: var(--vds-ls-tight); }\nh4 { font-size: var(--vds-fs-h4); color: var(--vds-text-heading); letter-spacing: var(--vds-ls-tight); }\n\np { margin: 0 0 var(--vds-space-16); text-wrap: pretty; }\n\na { color: var(--vds-accent); text-decoration: none; }\na:hover { color: var(--vds-accent-hover); }\n\ncode, kbd, samp { font-family: var(--vds-font-mono); }\n\n/* Eyebrow / small caps label — used above titles across the system */\n.vds-eyebrow {\n  color: var(--vds-deep-teal);\n  font-size: var(--vds-fs-sm);\n  font-weight: var(--vds-fw-bold);\n  letter-spacing: var(--vds-ls-eyebrow);\n  text-transform: uppercase;\n}\n<\u002Fstyle>\n<style>/* VATOS Design System — global entry point.\n   Consumers link this one file. Keep this as @import lines only. */\n/* VATOS webfonts — Pretendard (Korean + Latin) for UI/body, JetBrains Mono for code/metrics.\n   Pretendard is the brand's primary typeface across proposals, reports, HTML and PPT.\n   Loaded from CDN; if you need fully offline assets, self-host the woff2 files and update src. */\n\n@font-face {\n  font-family: \"Pretendard Variable\";\n  font-weight: 45 920;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2\") format(\"woff2-variations\");\n}\n\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-weight: 400 800;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.18/files/jetbrains-mono-latin-variable-wghtOnly-normal.woff2\") format(\"woff2-variations\");\n}\n\n/* ============================================================\n   VATOS · Color Tokens\n   브랜드 컬러는 구조와 강조에, Semantic Color는 상태 의미에 사용합니다.\n   색상만으로 의미를 전달하지 않고 항상 텍스트 라벨을 함께 사용합니다.\n   ============================================================ */\n:root {\n  /* ---- Brand / Dark structure ---- */\n  --vds-premium-dark: #07141F;  /* Dark 테마 최심 배경 — 표지/히어로/섹션 구분/Closing */\n  --vds-urban-navy:   #192C4F;  /* Urban Navy 테마 메인, 섹션 구분, 다크 카드 */\n  --vds-graphite:     #3D4345;  /* 제목 텍스트(강한 위계), 로고 마크 */\n  --vds-charcoal:     #4E5658;  /* 기본 본문/제목 텍스트 */\n\n  /* ---- Brand accent ---- */\n  --vds-cyan:      #23A5B3;  /* VATOS 브랜드 강조, CTA, 아이콘, 포인트 */\n  --vds-deep-teal: #0F4B51;  /* hover, eyebrow, 강조 텍스트 */\n\n  /* ---- Neutral surfaces ---- */\n  --vds-paper: #FFFEFA;  /* Light 테마 기본 문서 배경 (Paper White) */\n  --vds-cloud: #F7F9FA;  /* 보조 카드 배경, 표 헤더, 섹션 구분 */\n  --vds-soft:  #E8EEF0;  /* 보더, 구분선, 연한 배경 */\n  --vds-white: #FFFFFF;  /* 기본 카드 표면 */\n  --vds-page:  #FFFEFA;  /* 전체 문서 배경 — 밝고 깨끗하게 (Paper White) */\n\n  --vds-line: rgba(7, 20, 31, .12);  /* 기본 보더 컬러 */\n\n  /* ---- Semantic / status (의미 색상) ---- */\n  --vds-success:      #2E7D32;  --vds-success-soft: #E8F5E9;  /* 개선, 정상, 완료 */\n  --vds-danger:       #C62828;  --vds-danger-soft:  #FDECEC;  /* 저하, 오류, 위험 */\n  --vds-warning:      #F59E0B;  --vds-warning-soft: #FFF7E6;  --vds-warning-ink: #A76300; /* 주의, 검토 필요 */\n  --vds-info:         #2563EB;  --vds-info-soft:    #EFF6FF;  /* 참고, 안내 */\n  --vds-neutral:      #6F7A7D;                                /* 변경 없음, 중립 */\n\n  /* ---- Accent tints ---- */\n  --vds-cyan-tint: #E6F7F8;          /* cyan soft 배경 (라벨, chip) */\n  --vds-cyan-12:   rgba(35, 165, 179, .12);  /* focus ring */\n  --vds-cyan-on-dark: #7BE1EA;       /* 다크 배경 위 cyan 텍스트 */\n\n  /* ============================================================\n     Semantic aliases — 컴포넌트는 가능하면 이 별칭을 사용합니다.\n     ============================================================ */\n  --vds-text-strong:  var(--vds-graphite);   /* 제목/강조 텍스트 (Light 테마) */\n  --vds-text-heading: var(--vds-graphite);    /* 카드 제목 */\n  --vds-text-body:    var(--vds-charcoal);     /* 본문 */\n  --vds-text-muted:   var(--vds-neutral);      /* 주석, caption */\n  --vds-text-on-dark: var(--vds-white);\n  --vds-text-on-dark-soft: rgba(255, 255, 255, .78);\n  --vds-ink:          var(--vds-premium-dark);   /* 다크 표면 배경 전용 */\n\n  --vds-surface-page:   var(--vds-page);\n  --vds-surface-card:   var(--vds-white);\n  --vds-surface-sunken: var(--vds-cloud);\n  --vds-surface-dark:   var(--vds-premium-dark);  /* Dark 테마 최심 배경 */\n  --vds-surface-navy:   var(--vds-urban-navy);    /* Urban Navy 테마 (회사소개서) */\n  --vds-surface-dark-2: var(--vds-urban-navy);\n\n  --vds-border:       var(--vds-soft);\n  --vds-border-faint: var(--vds-line);\n\n  --vds-accent:       var(--vds-cyan);\n  --vds-accent-hover: var(--vds-deep-teal);\n}\n\n/* ============================================================\n   VATOS · Typography Tokens\n   Pretendard 기반으로 통일. 제목 → 요약 → 본문 → 주석 위계를 분명히 합니다.\n   제목은 음수 letter-spacing으로 단단하게, 본문은 1.6 내외 행간으로 가독성 우선.\n   ============================================================ */\n:root {\n  /* ---- Font families ---- */\n  --vds-font-sans: \"Pretendard Variable\", Pretendard, \"Noto Sans KR\", \"Malgun Gothic\", -apple-system, system-ui, sans-serif;\n  --vds-font-mono: \"JetBrains Mono\", Consolas, Monaco, \"Courier New\", monospace;\n\n  /* ---- Type scale (px) ----\n     16px가 본문 기준. PPT 1920x1080 본문은 24px 이상, 제목은 display 사용. */\n  --vds-fs-display:  56px;  /* 표지 hero, 대형 제목 */\n  --vds-fs-h1:       44px;  /* 페이지 타이틀 */\n  --vds-fs-h2:       32px;  /* 슬라이드 제목, 섹션 */\n  --vds-fs-h3:       24px;  /* 카드 제목, 블록 헤더 */\n  --vds-fs-h4:       19px;  /* 소제목 */\n  --vds-fs-lg:       17px;  /* 리드 본문 */\n  --vds-fs-body:     15px;  /* 기본 본문 */\n  --vds-fs-sm:       13px;  /* 보조 본문, 표 */\n  --vds-fs-xs:       12px;  /* caption, 라벨 */\n  --vds-fs-2xs:      11px;  /* 미세 라벨, 토큰 chip */\n\n  /* ---- Line heights ---- */\n  --vds-lh-tight:    1.1;   /* @kind font */ /* display, 대형 제목 */\n  --vds-lh-heading:  1.2;   /* @kind font */ /* 제목 */\n  --vds-lh-snug:     1.45;  /* @kind font */ /* 카드 copy, 표 */\n  --vds-lh-body:     1.62;  /* @kind font */ /* 본문 단락 */\n\n  /* ---- Weights (Pretendard variable) ---- */\n  --vds-fw-regular:  450;  /* @kind font */\n  --vds-fw-medium:   550;  /* @kind font */\n  --vds-fw-semibold: 700;  /* @kind font */\n  --vds-fw-bold:     800;  /* @kind font */\n  --vds-fw-black:    900;  /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --vds-ls-display: -.055em;  /* 대형 제목은 타이트하게 */\n  --vds-ls-heading: -.04em;\n  --vds-ls-tight:   -.025em;\n  --vds-ls-normal:  0;        /* @kind font */\n  --vds-ls-eyebrow: .09em;    /* eyebrow / 작은 대문자 라벨 */\n}\n\n/* ============================================================\n   VATOS · Spacing, Radius, Elevation Tokens\n   8px 단위를 중심으로 간격을 확장. 여백은 빈 공간이 아니라 정보 그룹을 구분하는 구조.\n   깊이감은 장식이 아니라 정보 그룹을 구분하는 보조 수단 — 얇은 보더 우선, 낮은 그림자.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale ---- */\n  --vds-space-4:  4px;   /* 아이콘과 텍스트 */\n  --vds-space-8:  8px;   /* 라벨과 값 */\n  --vds-space-12: 12px;  /* 작은 내부 간격 */\n  --vds-space-16: 16px;  /* 기본 요소 간격 */\n  --vds-space-24: 24px;  /* 카드 padding */\n  --vds-space-32: 32px;  /* 주요 블록 간격 */\n  --vds-space-48: 48px;  /* PPT 상하 여백 */\n  --vds-space-64: 64px;  /* HTML 큰 섹션 */\n\n  /* ---- Radius scale ---- (약한 라운드. 과한 둥근 UI는 캐주얼 → 제한) */\n  --vds-radius-xs:   4px;    /* 작은 라벨, 표 내부 요소 */\n  --vds-radius-sm:   8px;    /* 태그, 작은 박스 */\n  --vds-radius-md:   12px;   /* 버튼, 입력폼 */\n  --vds-radius-lg:   16px;   /* 기본 카드, 알림 박스 */\n  --vds-radius-xl:   20px;   /* 큰 컨테이너 */\n  --vds-radius-full: 999px;  /* 배지, pill */\n\n  /* ---- Elevation / shadow ---- (낮고 부드럽게. lg는 모달/팝오버 전용) */\n  --vds-shadow-xs: 0 2px 6px rgba(7, 20, 31, .04);   /* 아주 약한 표면 분리 */\n  --vds-shadow-sm: 0 6px 16px rgba(7, 20, 31, .05);  /* 일반 카드 */\n  --vds-shadow-md: 0 10px 26px rgba(7, 20, 31, .06); /* 핵심 카드, 요약 블록 */\n  --vds-shadow-lg: 0 18px 42px rgba(7, 20, 31, .10); /* 모달, 팝오버 전용 */\n\n  /* ---- Focus ring ---- */\n  --vds-ring: 0 0 0 3px var(--vds-cyan-12);\n\n  /* ---- Layout ---- */\n  --vds-container: 1280px;   /* HTML 문서 최대 폭 */\n  --vds-gutter:    24px;     /* 12-column grid gutter */\n}\n\n/* ============================================================\n   VATOS · Base / Element defaults\n   Applies brand typography + page color to the document.\n   Tokens come from tokens/*.css (imported before this in styles.css).\n   ============================================================ */\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  min-height: 100%;\n  font-family: var(--vds-font-sans);\n  font-size: var(--vds-fs-body);\n  line-height: var(--vds-lh-body);\n  color: var(--vds-text-body);\n  background: var(--vds-surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  margin: 0;\n  color: var(--vds-text-strong);\n  font-weight: var(--vds-fw-black);\n  line-height: var(--vds-lh-heading);\n  letter-spacing: var(--vds-ls-heading);\n  text-wrap: balance;\n}\nh1 { font-size: var(--vds-fs-h1); letter-spacing: var(--vds-ls-display); line-height: var(--vds-lh-tight); }\nh2 { font-size: var(--vds-fs-h2); }\nh3 { font-size: var(--vds-fs-h3); color: var(--vds-text-heading); letter-spacing: var(--vds-ls-tight); }\nh4 { font-size: var(--vds-fs-h4); color: var(--vds-text-heading); letter-spacing: var(--vds-ls-tight); }\n\np { margin: 0 0 var(--vds-space-16); text-wrap: pretty; }\n\na { color: var(--vds-accent); text-decoration: none; }\na:hover { color: var(--vds-accent-hover); }\n\ncode, kbd, samp { font-family: var(--vds-font-mono); }\n\n/* Eyebrow / small caps label — used above titles across the system */\n.vds-eyebrow {\n  color: var(--vds-deep-teal);\n  font-size: var(--vds-fs-sm);\n  font-weight: var(--vds-fw-bold);\n  letter-spacing: var(--vds-ls-eyebrow);\n  text-transform: uppercase;\n}\n\n<\u002Fstyle>\n<style>\n  body { margin:0; background:var(--vds-cloud); color:var(--vds-charcoal); font-family:var(--vds-font-sans); -webkit-font-smoothing:antialiased; word-break:keep-all; overflow-wrap:break-word; }\n  @media print { body{background:#fff;} .om-tabs{display:none!important;} .om-panel{display:block!important;} .om-chips{display:none!important;} h2,.om-canvas,.om-wsblock{break-inside:avoid;} }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:1180px;margin:0 auto;background:var(--vds-white);border-left:1px solid var(--vds-soft);border-right:1px solid var(--vds-soft);min-height:100vh;box-shadow:var(--vds-shadow-sm)\">\n\n  <!-- ===== HERO (Urban Navy) ===== -->\n  <header style=\"position:relative;overflow:hidden;background:var(--vds-urban-navy);color:#fff;padding:42px 56px 40px\">\n    <div style=\"position:absolute;inset:0;pointer-events:none\">\n      <div style=\"position:absolute;top:-12%;height:130%;right:-50px;width:280px;transform:skewX(-12deg);background:rgba(255,255,255,.035)\"><\u002Fdiv>\n      <div style=\"position:absolute;top:-12%;height:130%;right:130px;width:90px;transform:skewX(-12deg);background:rgba(255,255,255,.05)\"><\u002Fdiv>\n      <div style=\"position:absolute;top:-12%;height:130%;right:46px;width:5px;transform:skewX(-12deg);background:var(--vds-cyan)\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative\">\n      <img src=\"9b36e756-b98e-4913-bbb1-f620603e3936\" alt=\"VATOS\" style=\"height:34px;width:auto;display:block;margin-bottom:30px\">\n      <div style=\"width:56px;height:5px;border-radius:99px;background:var(--vds-cyan);margin-bottom:20px\"><\u002Fdiv>\n      <div style=\"color:var(--vds-cyan);font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px\">AI Transformation · 2026<\u002Fdiv>\n      <h1 style=\"font-size:38px;font-weight:900;letter-spacing:-.045em;line-height:1.1;margin:0 0 20px;color:#fff\">바토스 AI 전환 — 전체 그림<\u002Fh1>\n      <div style=\"display:flex;gap:13px;align-items:flex-start;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:16px 20px;max-width:880px\">\n        <span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-cyan);margin-top:8px\"><\u002Fspan>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.55;color:rgba(255,255,255,.9)\"><b style=\"color:#fff;font-weight:800\">North Star.<\u002Fb> 레거시 수작업 조직에서 → <b style=\"color:var(--vds-cyan-on-dark);font-weight:700\">AI가 초안·분석을 만들고, 사람은 판단·검증하는 조직<\u002Fb>으로.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;color:rgba(255,255,255,.62);font-size:12.5px;line-height:1.5\">2026년 목표 · 전 과제 병행 추진 · 데이터 정책: 마스킹 후 외부 활용 · 포탈 = 템플릿 + 완성 레포트만<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== TABS (folder / 파일철) ===== -->\n  <div style=\"background:var(--vds-cloud);padding:22px 40px 50px\">\n    <nav class=\"om-tabs\" style=\"display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px;padding-left:14px;position:relative;z-index:2;margin-bottom:-1px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ t.onClick }}\" onmouseenter=\"{{ t.onEnter }}\" onmouseleave=\"{{ t.onLeave }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"position:relative;z-index:1;background:var(--vds-white);border:1px solid var(--vds-soft);border-radius:0 16px 16px 16px;box-shadow:var(--vds-shadow-sm);padding:30px 44px 44px\">\n\n  <!-- ===================== PANEL 1 ===================== -->\n  <section class=\"om-panel\" data-screen-label=\"① 도착지 &amp; 전체 그림\" style=\"display:{{ p1 }}\">\n\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:8px 0 6px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">1<\u002Fspan>도착지 — 다 됐을 때 우리의 하루<\u002Fh2>\n    <p style=\"font-size:14.5px;color:var(--vds-neutral);margin:6px 0 4px;line-height:1.6\">우리가 향하는 곳을 먼저 본다. 전환이 완료된 2026년 말, 바토스의 보통 하루다.<\u002Fp>\n    <div style=\"position:relative;background:var(--vds-cloud);border:1px solid var(--vds-soft);border-radius:16px;padding:22px 24px 20px;margin:14px 0;font-size:14.5px;line-height:1.65;color:var(--vds-charcoal)\">\n      <div style=\"width:34px;height:4px;border-radius:99px;background:var(--vds-cyan);margin-bottom:14px\"><\u002Fdiv>\n      엔지니어가 고객사 DB를 점검하고 <b style=\"color:var(--vds-deep-teal);font-weight:700\">점검 데이터·AWR을 문서 포탈에 올린다.<\u002Fb> 잠시 후 <b style=\"color:var(--vds-deep-teal);font-weight:700\">자체 시스템이 회사 표준 템플릿(점검지·AWR·DB MAP)에 맞춰 진단 리포트 초안을 자동 생성<\u002Fb>한다. 엔지니어는 처음부터 쓰지 않는다 — <b style=\"color:var(--vds-deep-teal);font-weight:700\">읽고, 판단하고, 코멘트만<\u002Fb> 단다. 하루 걸리던 일이 한 시간이 된다.<br><br>\n      그 리포트는 <b style=\"color:var(--vds-deep-teal);font-weight:700\">회사 design 포맷으로 자동 정렬<\u002Fb>돼 포탈 제자리에 분류·보관된다. 다음에 비슷한 고객이 오면 <b style=\"color:var(--vds-deep-teal);font-weight:700\">RAG가 과거 사례를 근거로 끌어온다.<\u002Fb> 신입이 \"이 고객 예전 이슈?\"라고 물으면 포탈이 답한다 — 더 이상 \"그 사람만 아는\" 지식이 없다. 그 와중에 <b style=\"color:var(--vds-deep-teal);font-weight:700\">가드레일이 민감정보 유출을 차단<\u002Fb>한다. 경영진 화면엔 <b style=\"color:var(--vds-deep-teal);font-weight:700\">매출·마진이 실시간 대시보드<\u002Fb>로 떠 있고, 월말 엑셀 취합은 사라졌다.\n    <\u002Fdiv>\n    <h3 style=\"font-size:15px;font-weight:800;color:var(--vds-graphite);letter-spacing:-.02em;margin:24px 0 8px\">지금(As-Is) → 도착지(To-Be)<\u002Fh3>\n    <div style=\"border:1px solid var(--vds-soft);border-radius:14px;overflow:hidden;margin:14px 0\">\n      <table style=\"width:100%;border-collapse:collapse;font-size:13.5px\">\n        <thead><tr>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:18%\">영역<\u002Fth>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">지금 (As-Is)<\u002Fth>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">도착지 (2026말)<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">리포트 작성<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">사람이 처음부터 수작업<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">AI 초안 → 사람은 판단·검증<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">자료 보관<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">NAS에 흩어짐, 속인화(屬人化)<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">포탈에 표준 분류, 검색·재사용<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">지식<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">개인 머릿속<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">RAG로 조직 자산화<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">경영 지표<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">월말 수작업 취합<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">실시간 대시보드<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;font-weight:700;color:var(--vds-graphite)\">형식·품질<\u002Ftd><td style=\"padding:10px 14px;color:var(--vds-danger)\">사람마다 제각각<\u002Ftd><td style=\"padding:10px 14px;color:var(--vds-success);font-weight:550\">표준 템플릿·design 포맷 통일<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:40px 0 6px;padding-top:22px;border-top:1px solid var(--vds-soft);display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">2<\u002Fspan>전체 조감도 — 자체와 프런티어의 경계<\u002Fh2>\n    <p style=\"font-size:14.5px;color:var(--vds-neutral);margin:6px 0 4px;line-height:1.6\">핵심 질문 \"우리 자체 LLM이 거대 LLM을 대체할 수 있나?\"에 대한 답: <b style=\"color: var(--vds-urban-navy); font-weight: 700;\">대체하지 않는다.<\u002Fb> <br>지능(두뇌)은 외부에서 빌리고, 데이터는 사내에 두며, 그 사이를 가드레일이 통제한다.<\u002Fp>\n\n    <div class=\"om-canvas\" style=\"border:1px solid var(--vds-soft);border-radius:16px;overflow:hidden;margin:16px 0\">\n      <div style=\"display:grid;grid-template-columns:1fr 96px 1fr\">\n        <!-- 사내 -->\n        <div style=\"padding:18px 18px 22px;background:var(--vds-cyan-tint)\">\n          <div style=\"font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:13px;color:var(--vds-deep-teal)\">● 사내 (On-Prem) — 우리가 쥔다<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">문서 포탈 + NAS<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">자료가 사는 곳 · 검색·보관 허브<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">자체 LLM<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">메일·파일 분류 / 추출 / 라우팅(게이트키퍼)<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">임베딩 + RAG 검색<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">유사 사례·근거 찾기 (데이터 사내 유지)<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">.py 결정론 생성기<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">AWR 수치 파싱·계산·포맷 — 환각 없음<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">표준 템플릿 · design 포맷<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">점검지·AWR·DB MAP 등 \"어떻게 생겨야 하나\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- 가드레일 -->\n        <div style=\"padding:18px 10px;background:var(--vds-warning-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-left:1px dashed var(--vds-warning-ink);border-right:1px dashed var(--vds-warning-ink)\">\n          <div style=\"width:30px;height:30px;border-radius:8px;border:2px solid var(--vds-warning-ink);display:flex;align-items:center;justify-content:center;color:var(--vds-warning-ink);font-weight:800;font-size:15px\">!<\u002Fdiv>\n          <b style=\"font-size:12.5px;color:var(--vds-warning-ink);display:block;margin-top:9px\">가드레일<\u002Fb>\n          <div style=\"font-size:11px;color:var(--vds-warning-ink);margin:8px 0 2px\">▶ 마스킹된 요청<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--vds-warning-ink);margin:2px 0\">◀ 초안 응답<\u002Fdiv>\n          <b style=\"font-size:12px;color:var(--vds-warning-ink);display:block;margin-top:9px;line-height:1.35\">민감정보<br>마스킹<\u002Fb>\n        <\u002Fdiv>\n        <!-- 외부 -->\n        <div style=\"padding:18px 18px 22px;background:var(--vds-info-soft)\">\n          <div style=\"font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:13px;color:var(--vds-info)\">● 외부 (API) — 두뇌를 빌린다<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">프런티어 LLM<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">리포트 초안 작성 · 자연어 진단 · 종합 추론<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--vds-line);border-radius:10px;padding:10px 12px;margin:8px 0;box-shadow:var(--vds-shadow-xs)\"><b style=\"display:block;font-size:13px;color:var(--vds-graphite);margin-bottom:2px\">Claude design 등 도구<\u002Fb><span style=\"color:var(--vds-neutral);font-size:12px\">작문·정리·재구성의 무거운 지능<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:12px;color:var(--vds-neutral);margin:10px 0 0;line-height:1.55\">자체로 키우지 않는다. 추론·문장력은 큰 모델이 압도하며, 마스킹을 거쳐 안전하게 빌려 쓴다.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--vds-cloud);padding:13px 18px;font-size:13px;color:var(--vds-neutral);border-top:1px solid var(--vds-soft);line-height:1.6\"><b style=\"color:var(--vds-graphite)\">흐름:<\u002Fb> 사내 자료 → (자체) 검색·추출·결정론 처리 → 가드레일에서 마스킹 → 프런티어가 초안 생성 → 사내로 회수 → 사람 검증 → <b style=\"color:var(--vds-graphite)\">산출물<\u002Fb> → 포탈 보관 → 매출·마진 대시보드<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:12px;color:var(--vds-neutral);margin:6px 0 0;line-height:1.6\">DBA 비유: 자체 LLM·스크립트 = 데이터 곁의 로컬 프로시저·인덱스(빠르고 결정론적) · 프런티어 LLM = 외부 분석 엔진 · 가드레일 = VPD/마스킹. DB를 통째로 넘기지 않고, 민감 컬럼은 가린 채 쿼리만 외부로 보낸다.<\u002Fp>\n\n    <h3 style=\"font-size:15px;font-weight:800;color:var(--vds-graphite);letter-spacing:-.02em;margin:26px 0 10px\">산출물의 생명주기 — \"정의 ≠ 생성 ≠ 보관\"<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:1fr 28px 1fr 28px 1fr;align-items:center;margin:14px 0\">\n      <div style=\"background:var(--vds-cloud);border:1px solid var(--vds-soft);border-radius:12px;padding:14px 16px;text-align:center;font-size:13px;color:var(--vds-charcoal)\"><b style=\"display:block;margin-bottom:3px;color:var(--vds-urban-navy);font-size:14px\">① 표준 정의<\u002Fb>템플릿 · design 포맷 · 레포트 표준<br><span style=\"color:var(--vds-neutral);font-size:12px\">= DDL / 스키마<\u002Fspan><\u002Fdiv>\n      <div style=\"text-align:center;color:var(--vds-cyan);font-size:20px;font-weight:700\">→<\u002Fdiv>\n      <div style=\"background:var(--vds-cloud);border:1px solid var(--vds-soft);border-radius:12px;padding:14px 16px;text-align:center;font-size:13px;color:var(--vds-charcoal)\"><b style=\"display:block;margin-bottom:3px;color:var(--vds-urban-navy);font-size:14px\">② AI로 생성<\u002Fb>자체 LLM+RAG · 프런티어 · .py<br><span style=\"color:var(--vds-neutral);font-size:12px\">= 처리 엔진<\u002Fspan><\u002Fdiv>\n      <div style=\"text-align:center;color:var(--vds-cyan);font-size:20px;font-weight:700\">→<\u002Fdiv>\n      <div style=\"background:var(--vds-cloud);border:1px solid var(--vds-soft);border-radius:12px;padding:14px 16px;text-align:center;font-size:13px;color:var(--vds-charcoal)\"><b style=\"display:block;margin-bottom:3px;color:var(--vds-urban-navy);font-size:14px\">③ 포탈에 보관·재사용<\u002Fb>문서 포탈 · NAS · 보관정책<br><span style=\"color:var(--vds-neutral);font-size:12px\">= 테이블스페이스/파티셔닝<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:40px 0 6px;padding-top:22px;border-top:1px solid var(--vds-soft);display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">3<\u002Fspan>표준화 스펙트럼 — 어디까지 템플릿화하나<\u002Fh2>\n    <p style=\"font-size:14.5px;color:var(--vds-neutral);margin:6px 0 4px;line-height:1.6\">우리 일의 본질은 다양한 고객의 DB 관리 — 니즈가 제각각이라 <b style=\"color: var(--vds-urban-navy); font-weight: 700;\">\"전부 표준화\"는 불가능하고 목표도 아니다.<\u002Fb> <br>목표는 <b style=\"color: var(--vds-urban-navy); font-weight: 700;\">표준화 가능한 최대치를 템플릿으로 뽑아내는 것.<\u002Fb> 높은 쪽부터 공략한다.<\u002Fp>\n    <div style=\"border:1px solid var(--vds-soft);border-radius:14px;overflow:hidden;margin:14px 0\">\n      <table style=\"width:100%;border-collapse:collapse;font-size:13.5px\">\n        <thead><tr>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:24%\">업무 유형<\u002Fth>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">반복성<\u002Fth>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">표준화 가능성<\u002Fth>\n          <th style=\"text-align:left;padding:11px 14px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">접근<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">정기 점검 레포트<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">높음 (주기적)<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">높음<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">완전 템플릿화 + AI 자동 초안<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">AWR 분석<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">높음 (구조화)<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">높음<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">.py 결정론 수치 + LLM 서술<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">DB 분석 (필요시)<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">중간 (반정형)<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">부분<\u002Ftd><td style=\"padding:10px 14px;border-bottom:1px solid var(--vds-soft)\">분석 패턴 라이브러리 + 과거 사례(RAG)<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;font-weight:700;color:var(--vds-graphite)\">고객 맞춤 요청<\u002Ftd><td style=\"padding:10px 14px\">낮음 (비정형)<\u002Ftd><td style=\"padding:10px 14px;color:var(--vds-danger)\">낮음<\u002Ftd><td style=\"padding:10px 14px\">사람 주도, 과거 산출물 검색으로 가속<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <p style=\"font-size:14px;color:var(--vds-charcoal);margin:10px 0;line-height:1.6\">템플릿 = <b style=\"color:var(--vds-urban-navy);font-weight:700\">공통 골격(반복되는 80%) + 변수(고객별 20%)<\u002Fb>. <span style=\"color:var(--vds-neutral);font-size:12.5px\">DBA 비유: 바인드 변수를 둔 공통 쿼리 — 매번 새로 짜지 않고 인자만 바꿔 재사용.<\u002Fspan><\u002Fp>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:var(--vds-cyan-tint);border:1px solid #bfe6ea;border-radius:14px;padding:15px 20px;margin:14px 0\">\n      <span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-cyan);margin-top:7px\"><\u002Fspan>\n      <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color: var(--vds-deep-teal); font-weight: 700;\">문서 포탈 = 템플릿 + 완성 레포트만.<\u002Fb> 작업 원천·중간 파일은 NAS에 둔다.<br>&nbsp;포탈은 <b style=\"color: var(--vds-deep-teal); font-weight: 700;\">재사용 가능한 자산 라이브러리&nbsp;<\u002Fb>— 그래야 RAG가 깨끗한 근거만 본다.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== PANEL 2 ===================== -->\n  <section class=\"om-panel\" data-screen-label=\"② 구성원 행동\" style=\"display:{{ p2 }}\">\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:8px 0 6px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">4<\u002Fspan>구성원 행동 전환 — \"내가 월요일에 뭘 다르게 하나\"<\u002Fh2>\n    <p style=\"font-size:14.5px;color:var(--vds-neutral);margin:6px 0 4px;line-height:1.6\">조감도가 회사 관점(무엇을 구축하나)이라면, 이 표는 구성원 관점(나는 무엇을 다르게 하나)이다. 각자 자기 행(行)을 찾아 \"내 일이 이렇게 바뀌는구나\"를 본다.<\u002Fp>\n    <div style=\"border:1px solid var(--vds-soft);border-radius:14px;overflow:hidden;margin:14px 0\">\n      <table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n        <thead><tr>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:15%\">업무<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">지금 (As-Is)<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">바뀐 행동 (To-Be)<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">새로 익힐 것<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:11%\">트랙<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">정기 점검 레포트<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">매번 처음부터 작성<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">데이터 입력 → 초안 검토·교정<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">검토자 사고, 교정 피드백<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--vds-cyan-tint);color:var(--vds-deep-teal)\">산출물<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">AWR 분석<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">수치 수기 정리·해석<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">.py 자동 수치 → 진단만 검토<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">자동 결과 해석<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--vds-cyan-tint);color:var(--vds-deep-teal)\">산출물<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">DB 분석 (필요시)<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">매번 백지에서 분석<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">분석 패턴·과거 유사사례 참고 후 분석<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">패턴 라이브러리 활용<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--vds-cloud);color:var(--vds-neutral);border:1px solid var(--vds-soft)\">역량<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">고객 맞춤 요청<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-danger)\">백지에서 대응<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">과거 산출물 검색으로 가속, 사람 주도<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">포탈 검색 활용<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--vds-cloud);color:var(--vds-neutral);border:1px solid var(--vds-soft)\">기반<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\"><b>템플릿화 기여<\u002Fb> (신규)<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-neutral)\">(없던 행동)<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);color:var(--vds-success);font-weight:550\">반복 업무를 템플릿으로 추출·등록<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">골격/변수 구분, 표준화 시각<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--vds-cloud);color:var(--vds-neutral);border:1px solid var(--vds-soft)\">표준<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;font-weight:700;color:var(--vds-graphite)\">자료 보관<\u002Ftd><td style=\"padding:10px 13px;color:var(--vds-danger)\">개인 PC·메일·NAS 산재<\u002Ftd><td style=\"padding:10px 13px;color:var(--vds-success);font-weight:550\">완성본을 포탈에 표준 분류 업로드<\u002Ftd><td style=\"padding:10px 13px\">분류체계·메타데이터<\u002Ftd><td style=\"padding:10px 13px\"><span style=\"display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--vds-cloud);color:var(--vds-neutral);border:1px solid var(--vds-soft)\">기반<\u002Fspan><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <p style=\"font-size:12.5px;color:var(--vds-neutral);margin:10px 0 0;line-height:1.6\">가장 중요한 새 행동 둘: ① <b style=\"color:var(--vds-graphite)\">\"작성자 → 검토자\"<\u002Fb>로의 전환, ② <b style=\"color:var(--vds-graphite)\">반복 업무를 템플릿으로 추출<\u002Fb>하는 기여. 이 둘이 자리잡으면 전환이 스스로 굴러간다.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===================== PANEL 3 ===================== -->\n  <section class=\"om-panel\" data-screen-label=\"③ 실행 계획\" style=\"display:{{ p3 }}\">\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:8px 0 6px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">5<\u002Fspan>실행 계획 — 워크스트림 개요<\u002Fh2>\n    <p style=\"font-size:14.5px;color:var(--vds-neutral);margin:6px 0 4px;line-height:1.6\">실제 오너 기준 7개 워크스트림. 순서대로 끝내지 않고 <b style=\"color:var(--vds-urban-navy);font-weight:700\">전부 병행<\u002Fb>한다.<\u002Fp>\n    <div style=\"border:1px solid var(--vds-soft);border-radius:14px;overflow:hidden;margin:14px 0\">\n      <table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n        <thead><tr>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:18%\">워크스트림<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:16%\">오너<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px\">목표 (Done의 모습)<\u002Fth>\n          <th style=\"text-align:center;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:10%\">표준화<\u002Fth>\n          <th style=\"text-align:left;padding:11px 13px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:12px;width:20%\">핵심 의존성<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">디자인 표준<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">권다연<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">회사 design 포맷 정의 후 전 산출물에 일관 적용<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);text-align:center;color:var(--vds-neutral)\">—<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">모든 표준화 트랙의 입력<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">표준화 · AWR<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">고채영<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">AWR 리포트 템플릿화 + AI 자동 초안<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);text-align:center;color:var(--vds-success);font-weight:550\">높음<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">내부 LLM(생성), 디자인<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">표준화 · DB 정보수집<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">권혁준<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">수집 항목 표준화 + 분석 패턴 라이브러리<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);text-align:center;color:var(--vds-neutral)\">부분<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">내부 LLM(검색)<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">표준화 · 고객 점검지<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">이향리<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">정기 점검지 템플릿화 + 자동 채움<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);text-align:center;color:var(--vds-success);font-weight:550\">높음<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">내부 LLM, 디자인, DB정보수집<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">내부 LLM<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">유지혜·정성희·이향리<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">RAG 검색 + 마스킹 가드레일 + 프런티어 생성 엔진<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);text-align:center;color:var(--vds-neutral)\">—<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">포탈/자료(전제) → 전 표준화에 공급<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-graphite)\">내부 경영문서<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">황현경·이기송<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">매출/마진 경영문서 자동화 + 실시간 대시보드<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft);text-align:center;color:var(--vds-neutral)\">부분<\u002Ftd><td style=\"padding:10px 13px;border-bottom:1px solid var(--vds-soft)\">데이터 소스, 내부 LLM<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 13px;font-weight:700;color:var(--vds-graphite)\">(공통) 기반 · 포탈/NAS<\u002Ftd><td style=\"padding:10px 13px;color:var(--vds-danger);font-weight:600\">미지정 ⚠<\u002Ftd><td style=\"padding:10px 13px\">템플릿+완성본 포탈 구축, 분류체계 확립<\u002Ftd><td style=\"padding:10px 13px;text-align:center;color:var(--vds-neutral)\">—<\u002Ftd><td style=\"padding:10px 13px\">전 트랙의 전제<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:11px;align-items:flex-start;background:var(--vds-danger-soft);border:1px solid #f3cfcf;border-radius:12px;padding:13px 18px;margin:12px 0\">\n      <span style=\"flex:0 0 7px;width:7px;height:7px;border-radius:50%;background:var(--vds-danger);margin-top:7px\"><\u002Fspan>\n      <p style=\"margin:0;font-size:13px;color:var(--vds-charcoal);line-height:1.55\"><b style=\"color:var(--vds-danger)\">공통 기반(포탈/NAS) 오너가 비어 있다.<\u002Fb> 모든 트랙의 전제라 책임자 지정이 가장 시급하다.<\u002Fp>\n    <\u002Fdiv>\n\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:40px 0 6px;padding-top:22px;border-top:1px solid var(--vds-soft);display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:  12px;background:var(--vds-cloud);color:var(--vds-urban-navy);font-weight:700;font-size:11.5px;border-bottom:1px solid var(--vds-soft);width:16%\">의존성<\u002Fth>\n          <th style=\"text-align:left;padding:9px 12px;background:var(--vds-cloud);color:var(--vds-urban-navy);font-weight:700;font-size:11.5px;border-bottom:1px solid var(--vds-soft);width:22%\">완료기준 (DoD)<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-neutral)\">B1<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">문서 포탈 구조·분류체계 확정(템플릿+완성본만)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:1px 8px;border-radius:5px;font-size:11px;font-weight:700;background:var(--vds-info-soft);color:var(--vds-info)\">Q3<\u002Fspan><\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">포탈 IA<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft);color:var(--vds-neutral)\">—<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">분류체계 승인<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-neutral)\">B2<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">NAS↔포탈 역할 분리·이관 규칙<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\"><span style=\"display:inline-block;padding:1px 8px;border-radius:5px;font-size:11px;font-weight:700;background:var(--vds-info-soft);color:var(--vds-info)\">Q3<\u002Fspan><\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">이관 가이드<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">B1<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid var(--vds-soft)\">규칙 배포<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:9px 12px;font-weight:700;color:var(--vds-neutral)\">B3<\u002Ftd><td style=\"padding:9px 12px\">핵심 자료 포탈 이관·검색 가능화<\u002Ftd><td style=\"padding:9px 12px\"><span style=\"display:inline-block;padding:1px 8px;border-radius:5px;font-size:11px;font-weight:700;background:var(--vds-warning-soft);color:var(--vds-warning-ink)\">Q4<\u002Fspan><\u002Ftd><td style=\"padding:9px 12px\">이관 완료<\u002Ftd><td style=\"padding:9px 12px\">B1·B2·LLM<\u002Ftd><td style=\"padding:9px 12px\">검색에 잡힘<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:40px 0 6px;padding-top:22px;border-top:1px solid var(--vds-soft);display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">7<\u002Fspan>분기 마일스톤<\u002Fh2>\n    <div style=\"border:1px solid var(--vds-soft);border-radius:14px;overflow:hidden;margin:14px 0\">\n      <table style=\"width:100%;border-collapse:collapse;font-size:12px\">\n        <thead><tr>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px;width:11%\">분기<\u002Fth>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px\">디자인<\u002Fth>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px\">AWR<\u002Fth>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px\">DB 정보수집<\u002Fth>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px\">고객 점검지<\u002Fth>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px\">내부 LLM<\u002Fth>\n          <th style=\"text-align:left;padding:10px 12px;background:var(--vds-urban-navy);color:#fff;font-weight:700;font-size:11.5px\">경영문서<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft);font-weight:700;color:var(--vds-urban-navy);white-space:nowrap\">Q3 (~9월)<\u002Ftd><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft)\">가이드 v1 + 스타일셋<\u002Ftd><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft)\">양식 분석·골격 분리·파서 정의<\u002Ftd><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft)\">수집 항목 표준·도구<\u002Ftd><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft)\">현황·항목 표준<\u002Ftd><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft)\">RAG 검색·마스킹 가동<\u002Ftd><td style=\"padding:10px 12px;border-bottom:1px solid var(--vds-soft)\">인벤토리·지표 정의<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 12px;font-weight:700;color:var(--vds-urban-navy);white-space:nowrap\">Q4 (~12월)<\u002Ftd><td style=\"padding:10px 12px\">표준 양식 적용·검수<\u002Ftd><td style=\"padding:10px 12px\">초안 자동생성 파일럿 완주<\u002Ftd><td style=\"padding:10px 12px\">결과 템플릿·패턴 라이브러리<\u002Ftd><td style=\"padding:10px 12px\">템플릿·자동 채움<\u002Ftd><td style=\"padding:10px 12px\">프런티어 연동·생성 서비스<\u002Ftd><td style=\"padding:10px 12px\">템플릿·대시보드 베타<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== PANEL 4 ===================== -->\n  <section class=\"om-panel\" data-screen-label=\"④ 운영 &amp; 의사결정\" style=\"display:{{ p4 }}\">\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:8px 0 6px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">8<\u002Fspan>정렬 리듬 — 구성원이 함께 가게 하는 법<\u002Fh2>\n    <p style=\"font-size:14.5px;color:var(--vds-neutral);margin:6px 0 4px;line-height:1.6\">과제는 프로젝트로 풀리지만, 정렬(consistency)은 프로젝트로 안 풀린다. 반복되는 메시지 + 보이는 지도 + 운영 리듬으로 풀린다.<\u002Fp>\n    <ul style=\"list-style:none;margin:14px 0;padding:0\">\n      <li style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-cyan);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-graphite)\">이 문서를 공유 자산으로.<\u002Fb> 모두가 볼 수 있는 곳에 두고, 각자 ②구성원 행동 탭에서 자기 행을 짚게 한다.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-cyan);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-graphite)\">격주 동기화(30분).<\u002Fb> 트랙별 한 줄 진척 + 막힌 점만. 길게 하지 않는다.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-cyan);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-graphite)\">분기 데모데이.<\u002Fb> 말이 아니라 \"돌아가는 것\"을 보여준다 — AWR 초안 1건, 포탈 검색 시연 등. 도착지가 가까워짐을 체감시킨다.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--vds-soft);border-bottom:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-cyan);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-graphite)\">가드레일 = 안심 장치로 소통.<\u002Fb> AI 도입의 불안(유출)을 마스킹 정책으로 먼저 해소해 저항을 줄인다.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--vds-urban-navy);margin:40px 0 6px;padding-top:22px;border-top:1px solid var(--vds-soft);display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--vds-urban-navy);color:#fff;border-radius:50%;font-size:14px;font-weight:700;margin-right:11px;flex:0 0 28px\">9<\u002Fspan>경영진 의사결정 요청<\u002Fh2>\n    <div style=\"position:relative;background:var(--vds-cloud);border:1px solid var(--vds-soft);border-radius:16px;padding:14px 24px 10px;margin:14px 0;overflow:hidden\">\n      <ul style=\"list-style:none;margin:0;padding:0\">\n        <li style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-urban-navy);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-urban-navy)\">데이터 정책 승인 — \"마스킹 후 외부 활용\".<\u002Fb> 이 한 줄이 전체 구조를 결정한다.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-urban-navy);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-urban-navy)\">공통 기반(포탈/NAS) 오너 지정.<\u002Fb> 모든 트랙의 전제인데 현재 비어 있다 — 최우선.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--vds-soft)\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-urban-navy);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-urban-navy)\">투자 우선순위 합의.<\u002Fb> 6개를 따로 보지 말고 하나의 흐름으로 — 기반·역량이 깔려야 산출물이 좋아진다.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0\"><span style=\"flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--vds-urban-navy);margin-top:7px\"><\u002Fspan><span style=\"font-size:14px;line-height:1.6;color:var(--vds-charcoal)\"><b style=\"color:var(--vds-urban-navy)\">연내 가시 성과 = 산출물 트랙.<\u002Fb> AWR 자동 리포트·매출/마진 대시보드를 quick win으로 먼저 보여준다.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <p style=\"font-size:12.5px;color:var(--vds-neutral);margin:10px 0 0;line-height:1.6\">전제 점검: To-Be가 실제로 돌아가려면 ① 자료의 포탈 입력 습관, ② 템플릿의 기계가독 정의, ③ 마스킹 신뢰성, ④ 사람의 검토자 전환 — 이 넷이 충족되어야 한다. 기술보다 ①·④가 더 어렵다.<\u002Fp>\n  <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"display:flex;justify-content:space-between;align-items:center;padding:18px 56px;border-top:1px solid var(--vds-soft);background:var(--vds-cloud);color:var(--vds-neutral);font-size:12px\">\n    <span>© VATOS Co., Ltd. · 바토스 AI 전환 전체 그림<\u002Fspan>\n    <span>vatos.co.kr &nbsp;·&nbsp; <b style=\"color: var(--vds-urban-navy); font-weight: 700;\">inspire the next<\u002Fb><\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 't1', filter: 'all', hover: null };\n\n  renderVals() {\n    const tab = this.state.tab;\n    const filter = this.state.filter;\n\n    // 파일철(folder) 탭: 활성 탭은 흰 본문 패널과 이어지고, 비활성 탭은 회색으로 뒤로 물러남.\n    const fBase = 'position:relative;cursor:pointer;font-weight:700;letter-spacing:-.01em;white-space:nowrap;border-radius:12px 12px 0 0;font-size:14px;transition:background .12s ease,color .12s ease;';\n    const tabDefs = [\n      { id: 't1', label: '① 도착지 & 전체 그림' },\n      { id: 't2', label: '② 구성원 행동' },\n      { id: 't3', label: '③ 실행 계획' },\n      { id: 't4', label: '④ 운영 & 의사결정' },\n    ];\n    const hover = this.state.hover;\n    const tabStyle = (t) => {\n      if (t.id === tab) return fBase + 'padding:14px 24px 13px;background:var(--vds-white);border:1px solid var(--vds-soft);border-bottom:1px solid var(--vds-white);color:var(--vds-deep-teal);z-index:3;';\n      if (t.id === hover) return fBase + 'padding:10px 22px 11px;background:var(--vds-cyan-tint);border:1px solid #bfe6ea;border-bottom:1px solid var(--vds-soft);color:var(--vds-deep-teal);z-index:1;';\n      return fBase + 'padding:10px 22px 11px;background:var(--vds-soft);border:1px solid var(--vds-soft);border-bottom:1px solid var(--vds-soft);color:var(--vds-neutral);z-index:1;';\n    };\n    const tabs = tabDefs.map(t => ({\n      id: t.id,\n      label: t.label,\n      style: tabStyle(t),\n      onEnter: () => this.setState({ hover: t.id }),\n      onLeave: () => this.setState(s => (s.hover === t.id ? { hover: null } : null)),\n      onClick: () => { this.setState({ tab: t.id, hover: null }); try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {} },\n    }));\n\n    const chipBase = 'padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;';\n    const chipDefs = [\n      { f: 'all', label: '전체' }, { f: 'design', label: '디자인' }, { f: 'awr', label: 'AWR' },\n      { f: 'dbc', label: 'DB정보수집' }, { f: 'insp', label: '고객점검지' }, { f: 'llm', label: '내부 LLM' },\n      { f: 'biz', label: '경영문서' }, { f: 'base', label: '공통기반' },\n    ];\n    const chips = chipDefs.map(c => ({\n      label: c.label,\n      style: chipBase + (c.f === filter\n        ? 'background:var(--vds-urban-navy);color:#fff;border:1px solid var(--vds-urban-navy);'\n        : 'background:var(--vds-white);color:var(--vds-neutral);border:1px solid var(--vds-soft);'),\n      onClick: () => this.setState({ filter: c.f }),\n    }));\n\n    const show = id => (tab === id ? 'block' : 'none');\n    const ws = w => (filter === 'all' || filter === w ? 'block' : 'none');\n\n    return {\n      tabs, chips,\n      p1: show('t1'), p2: show('t2'), p3: show('t3'), p4: show('t4'),\n      wsDesign: ws('design'), wsAwr: ws('awr'), wsDbc: ws('dbc'), wsInsp: ws('insp'),\n      wsLlm: ws('llm'), wsBiz: ws('biz'), wsBase: ws('base'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
